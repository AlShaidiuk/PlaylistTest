<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кастомизация плейлиста</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .custom-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
        #songInputs {
            list-style: none;
            padding: 0;
        }
        #songInputs li {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        #songInputs input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background: #c0392b;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-btn {
            background: #3498db;
            color: white;
        }
        .add-btn:hover { background: #2980b9; }
        .save-btn {
            background: #2ecc71;
            color: white;
        }
        .save-btn:hover { background: #27ae60; }
        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #e67e22;
        }
    </style>
</head>
<body>
    <div class="custom-panel">
        <h1>🎵 Редактирование плейлиста</h1>
        <ul id="songInputs"></ul>
        <div class="actions">
            <button id="addBtn" class="btn add-btn">➕ Добавить песню</button>
            <button id="saveBtn" class="btn save-btn">💾 Сохранить изменения</button>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script type="module">
        // Простейшая защита паролем (смени на свой)
        const PASSWORD = 'admin';
        const pass = prompt('Введите пароль для доступа к кастомизации:');
        if (pass !== PASSWORD) {
            document.body.innerHTML = '<h1 style="text-align:center; margin-top:50px;">Доступ запрещён</h1>';
            throw new Error('Неверный пароль');
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ Замени на СВОЙ конфиг Firebase (тот же, что в других страницах)
        const firebaseConfig = {
            apiKey: "AIzaSyAfxfl7oncihM8TUHbfgi9lr95St-KNRX8",
            authDomain: "songlisttestproj.firebaseapp.com",
            databaseURL: "https://songlisttestproj-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "songlisttestproj",
            storageBucket: "songlisttestproj.firebasestorage.app",
            messagingSenderId: "134407495087",
            appId: "1:134407495087:web:c450f82c497e785eca235a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const songsRef = ref(db, 'playlist/songs');
        const votersRef = ref(db, 'voters');

        const songInputs = document.getElementById('songInputs');
        const addBtn = document.getElementById('addBtn');
        const saveBtn = document.getElementById('saveBtn');
        const messageDiv = document.getElementById('message');

        // Загружаем текущий список песен из Firebase и отображаем
        function loadSongs() {
            onValue(songsRef, (snapshot) => {
                const songs = snapshot.val() || [];
                renderInputs(songs);
            }, { onlyOnce: false });
        }

        // Отрисовываем поля ввода
        function renderInputs(songs) {
            songInputs.innerHTML = '';
            songs.forEach((song, index) => {
                addSongInput(song, index);
            });
            // Если список пуст, добавляем одно пустое поле
            if (songs.length === 0) {
                addSongInput('', 0);
            }
        }

        // Добавляем одно поле ввода
        function addSongInput(value = '', index) {
            const li = document.createElement('li');
            li.innerHTML = `
                <input type="text" class="song-input" value="${value.replace(/"/g, '&quot;')}" placeholder="Название песни">
                <button class="delete-btn">✕</button>
            `;
            li.querySelector('.delete-btn').addEventListener('click', () => {
                li.remove();
            });
            songInputs.appendChild(li);
        }

        // Собрать текущие значения полей в массив
        function getCurrentSongs() {
            const inputs = document.querySelectorAll('.song-input');
            return Array.from(inputs)
                .map(input => input.value.trim())
                .filter(name => name !== '');
        }

        // Сохранить в Firebase
        saveBtn.addEventListener('click', async () => {
            const newSongs = getCurrentSongs();
            if (newSongs.length === 0) {
        messageDiv.textContent = 'Добавьте хотя бы одну песню!';
            return;
    }
            if (!confirm('Сохранить список? Это сбросит все текущие голоса и номера.')) return;

            try {
                await set(songsRef, newSongs);
                await set(votersRef, null);
                await set(ref(db, 'metadata/nextNumber'), null);   // ← сброс номеров
                messageDiv.textContent = '✅ Список сохранён, голоса и номера сброшены!';
    }        catch (err) {
                messageDiv.textContent = '❌ Ошибка: ' + err.message;
    }
        });

        // Добавить новую пустую строку
        addBtn.addEventListener('click', () => {
            addSongInput('', Date.now());
        });

        // Первоначальная загрузка
        loadSongs();
    </script>
</body>
</html>
