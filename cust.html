<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кастомизация плейлиста</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .custom-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 { text-align: center; margin-top: 0; }
        #songInputs { list-style: none; padding: 0; }
        #songInputs li {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .song-name-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .already-sung-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
        }
        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        .delete-btn:hover { background: #c0392b; }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-btn { background: #3498db; color: white; }
        .add-btn:hover { background: #2980b9; }
        .save-btn { background: #2ecc71; color: white; }
        .save-btn:hover { background: #27ae60; }
        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #e67e22;
        }
    </style>
</head>
<body>
    <div class="custom-panel">
        <h1>🎵 Редактирование плейлиста</h1>
        <ul id="songInputs"></ul>
        <div class="actions">
            <button id="addBtn" class="btn add-btn">➕ Добавить песню</button>
            <button id="saveBtn" class="btn save-btn">💾 Сохранить изменения</button>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script type="module">
        // Защита паролем (смени на свой)
        const PASSWORD = 'admin';
        const pass = prompt('Введите пароль для доступа к кастомизации:');
        if (pass !== PASSWORD) {
            document.body.innerHTML = '<h1 style="text-align:center; margin-top:50px;">Доступ запрещён</h1>';
            throw new Error('Неверный пароль');
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ Замени на СВОЙ конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAfxfl7oncihM8TUHbfgi9lr95St-KNRX8",
            authDomain: "songlisttestproj.firebaseapp.com",
            databaseURL: "https://songlisttestproj-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "songlisttestproj",
            storageBucket: "songlisttestproj.firebasestorage.app",
            messagingSenderId: "134407495087",
            appId: "1:134407495087:web:c450f82c497e785eca235a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const allSongsRef = ref(db, 'playlist/allSongs');   // полный список с отметками
        const activeSongsRef = ref(db, 'playlist/songs');   // активные песни (строками)
        const votersRef = ref(db, 'voters');
        const nextNumberRef = ref(db, 'metadata/nextNumber');

        const songInputs = document.getElementById('songInputs');
        const addBtn = document.getElementById('addBtn');
        const saveBtn = document.getElementById('saveBtn');
        const messageDiv = document.getElementById('message');

        // Загружаем полный список при старте
        onValue(allSongsRef, (snapshot) => {
            const data = snapshot.val();
            if (data && Array.isArray(data)) {
                renderInputs(data);
            } else {
                // Если allSongs ещё нет, пробуем загрузить активный плейлист и преобразовать
                onValue(activeSongsRef, (activeSnapshot) => {
                    const activeSongs = activeSnapshot.val() || [];
                    const converted = activeSongs.map(name => ({ name, alreadySung: false }));
                    renderInputs(converted);
                }, { onlyOnce: true });
            }
        }, { onlyOnce: true });

        function renderInputs(songsArray) {
            songInputs.innerHTML = '';
            if (!songsArray.length) {
                addSongInput({ name: '', alreadySung: false });
            } else {
                songsArray.forEach(song => addSongInput(song));
            }
        }

        function addSongInput(songObj = { name: '', alreadySung: false }) {
            const li = document.createElement('li');
            li.innerHTML = `
                <input type="text" class="song-name-input" value="${(songObj.name || '').replace(/"/g, '&quot;')}" placeholder="Название песни">
                <label class="already-sung-label">
                    <input type="checkbox" class="already-sung-checkbox" ${songObj.alreadySung ? 'checked' : ''}>
                    Уже пели
                </label>
                <button class="delete-btn">✕</button>
            `;
            li.querySelector('.delete-btn').addEventListener('click', () => li.remove());
            songInputs.appendChild(li);
        }

        function getCurrentSongsData() {
            const items = [];
            const rows = songInputs.querySelectorAll('li');
            rows.forEach(row => {
                const nameInput = row.querySelector('.song-name-input');
                const checkbox = row.querySelector('.already-sung-checkbox');
                const name = nameInput.value.trim();
                if (name !== '') {
                    items.push({
                        name: name,
                        alreadySung: checkbox.checked
                    });
                }
            });
            return items;
        }

        saveBtn.addEventListener('click', async () => {
            const allData = getCurrentSongsData();
            if (allData.length === 0) {
                messageDiv.textContent = 'Добавьте хотя бы одну песню!';
                return;
            }
            if (!confirm('Сохранить изменения? Это сбросит все текущие голоса и номера.')) return;

            try {
                // Сохраняем полный список с отметками
                await set(allSongsRef, allData);
                // Фильтруем активные песни (alreadySung !== true)
                const activeNames = allData.filter(s => !s.alreadySung).map(s => s.name);
                await set(activeSongsRef, activeNames);
                // Сбрасываем голоса и номера
                await set(votersRef, null);
                await set(nextNumberRef, null);
                messageDiv.textContent = '✅ Список сохранён, голоса и номера сброшены!';
            } catch (err) {
                messageDiv.textContent = '❌ Ошибка: ' + err.message;
            }
        });

        addBtn.addEventListener('click', () => {
            addSongInput({ name: '', alreadySung: false });
        });
    </script>
</body>
</html>
