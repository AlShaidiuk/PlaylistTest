<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка – Голосование</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .admin-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
        .song-bar {
            margin-bottom: 20px;
        }
        .song-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .progress {
            background: #eee;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #4CAF50;
            border-radius: 10px;
            transition: width 0.3s ease;
            text-align: right;
            padding-right: 5px;
            color: white;
            font-size: 14px;
            line-height: 24px;
            box-sizing: border-box;
        }
        .total-votes {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1>📊 Результаты голосования</h1>
        <div id="results"></div>
        <div class="total-votes" id="totalVotes">Всего голосов: 0</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            // ⚠️ Те же настройки, что и в клиентской странице
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const songs = [
            "Песня трубадура",
            "Седьмой лепесток",
            "Выхода нет",
            "Мой рок-н-ролл",
            "Знаешь ли ты",
            "Родина",
            "Батарейка"
        ];

        // Счётчик голосов: будем хранить объект { песня: количество }
        // Используем отдельную ветку в базе для подсчёта голосов
        const votesRef = ref(db, 'votes');

        function renderBars(votes) {
            const total = Object.values(votes).reduce((sum, val) => sum + val, 0);
            const container = document.getElementById('results');
            container.innerHTML = '';
            songs.forEach(song => {
                const count = votes[song] || 0;
                const percent = total === 0 ? 0 : (count / total) * 100;
                const html = `
                    <div class="song-bar">
                        <div class="song-label">
                            <span>${song}</span>
                            <span>${count} голос(ов)</span>
                        </div>
                        <div class="progress">
                            <div class="progress-fill" style="width: ${percent}%">
                                ${percent > 5 ? Math.round(percent) + '%' : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
            document.getElementById('totalVotes').textContent = `Всего голосов: ${total}`;
        }

        // Инициализация и слушатель изменений
        onValue(votesRef, (snapshot) => {
            const data = snapshot.val() || {};
            renderBars(data);
        });

        // Функция для добавления голоса (вызывается клиентом)
        // Но в клиентской странице мы просто overwrite currentVote.
        // Лучше сделать так: клиент отправляет не currentVote, а увеличивает счётчик конкретной песни.
        // Поэтому доработаем клиентскую страницу: при подтверждении отправим транзакцию.
        // Ниже я дам обновлённый скрипт для клиента, который увеличивает счётчик.
    </script>
</body>
</html>
