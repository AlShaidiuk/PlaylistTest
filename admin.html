<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка – Голосование</title>
    <style>
        /* Твои прежние стили для админки (с progress-bar и т.д.) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .admin-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
        .reset-btn {
            display: block;
            margin: 0 auto 25px;
            padding: 10px 25px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        .reset-btn:hover {
            background-color: #c0392b;
        }
        .song-bar {
            margin-bottom: 20px;
        }
        .song-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .progress {
            background: #eee;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #4CAF50;
            border-radius: 10px;
            transition: width 0.3s ease;
            text-align: right;
            padding-right: 5px;
            color: white;
            font-size: 14px;
            line-height: 24px;
            box-sizing: border-box;
        }
        .total-votes {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1>📊 Результаты голосования</h1>
        <button id="resetBtn" class="reset-btn">🗑 Сбросить все голоса</button>
        <div id="results"></div>
        <div class="total-votes" id="totalVotes">Всего голосов: 0</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfxfl7oncihM8TUHbfgi9lr95St-KNRX8",
            authDomain: "songlisttestproj.firebaseapp.com",
            databaseURL: "https://songlisttestproj-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "songlisttestproj",
            storageBucket: "songlisttestproj.firebasestorage.app",
            messagingSenderId: "134407495087",
            appId: "1:134407495087:web:c450f82c497e785eca235a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const votersRef = ref(db, 'voters');
        const songsRef = ref(db, 'playlist/songs');
        const resultsDiv = document.getElementById('results');
        const totalVotesSpan = document.getElementById('totalVotes');

        let currentSongs = [];

        // Получаем актуальный список песен
        onValue(songsRef, (snapshot) => {
            currentSongs = snapshot.val() || [];
            // При изменении списка песен – перерисовать (даже если голоса ещё не загрузились)
            if (window.lastVotersData) {
                renderBars(window.lastVotersData);
            }
        });

        // Слушаем голоса
        onValue(votersRef, (snapshot) => {
            const votersData = snapshot.val() || {};
            window.lastVotersData = votersData;
            renderBars(votersData);
        });

        function renderBars(votersData) {
            if (!currentSongs.length) {
                resultsDiv.innerHTML = '<p style="text-align:center">Нет песен для отображения</p>';
                totalVotesSpan.textContent = 'Всего голосов: 0';
                return;
            }

            const votes = {};
            currentSongs.forEach(song => { votes[song] = 0; });

            let total = 0;
            Object.values(votersData).forEach(entry => {
                if (entry.song && votes.hasOwnProperty(entry.song)) {
                    votes[entry.song]++;
                    total++;
                }
                // Голоса за удалённые песни игнорируются
            });

            resultsDiv.innerHTML = '';
            currentSongs.forEach(song => {
                const count = votes[song];
                const percent = total === 0 ? 0 : (count / total) * 100;
                const html = `
                    <div class="song-bar">
                        <div class="song-label">
                            <span>${song.replace(/</g, '&lt;')}</span>
                            <span>${count} голос(ов)</span>
                        </div>
                        <div class="progress">
                            <div class="progress-fill" style="width: ${percent}%">
                                ${percent > 5 ? Math.round(percent) + '%' : ''}
                            </div>
                        </div>
                    </div>
                `;
                resultsDiv.innerHTML += html;
            });
            totalVotesSpan.textContent = `Всего голосов: ${total}`;
        }

        // Сброс голосов
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('Сбросить все голоса? Участники смогут проголосовать заново.')) {
                set(votersRef, null)
                    .then(() => alert('Голоса сброшены.'))
                    .catch(err => alert('Ошибка: ' + err.message));
            }
        });
    </script>
</body>
</html>
