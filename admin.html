<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка – Голосование</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .admin-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
        .reset-btn, .draw-btn {
            display: block;
            margin: 10px auto;
            padding: 12px 25px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        .reset-btn {
            background-color: #e74c3c;
        }
        .reset-btn:hover {
            background-color: #c0392b;
        }
        .draw-btn {
            background-color: #3498db;
        }
        .draw-btn:hover {
            background-color: #2980b9;
        }
        .song-bar {
            margin-bottom: 20px;
        }
        .song-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .progress {
            background: #eee;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #4CAF50;
            border-radius: 10px;
            transition: width 0.3s ease;
            text-align: right;
            padding-right: 5px;
            color: white;
            font-size: 14px;
            line-height: 24px;
            box-sizing: border-box;
        }
        .total-votes {
            text-align: center;
            margin: 20px 0;
            font-size: 18px;
        }
        .draw-result {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 10px;
            font-size: 18px;
        }
        .draw-result strong {
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1>📊 Результаты голосования</h1>
        <button id="resetBtn" class="reset-btn">🗑 Сбросить все голоса</button>
        <button id="drawBtn" class="draw-btn">🎤 Кто будет петь?</button>
        <div id="results"></div>
        <div class="total-votes" id="totalVotes">Всего голосов: 0</div>
        <div id="drawResult" class="draw-result" style="display: none;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ Замени на свой конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAfxfl7oncihM8TUHbfgi9lr95St-KNRX8",
            authDomain: "songlisttestproj.firebaseapp.com",
            databaseURL: "https://songlisttestproj-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "songlisttestproj",
            storageBucket: "songlisttestproj.firebasestorage.app",
            messagingSenderId: "134407495087",
            appId: "1:134407495087:web:c450f82c497e785eca235a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const votersRef = ref(db, 'voters');
        const songsRef = ref(db, 'playlist/songs');
        const nextNumberRef = ref(db, 'metadata/nextNumber');
        const resultsDiv = document.getElementById('results');
        const totalVotesSpan = document.getElementById('totalVotes');
        const drawResultDiv = document.getElementById('drawResult');

        let currentSongs = [];
        let lastVotersData = null;

        // Получаем актуальный список песен
        onValue(songsRef, (snapshot) => {
            currentSongs = snapshot.val() || [];
            if (lastVotersData) {
                renderBars(lastVotersData);
            }
        });

        // Слушаем голоса
        onValue(votersRef, (snapshot) => {
            lastVotersData = snapshot.val() || {};
            renderBars(lastVotersData);
        });

        function renderBars(votersData) {
            if (!currentSongs.length) {
                resultsDiv.innerHTML = '<p style="text-align:center">Нет песен для отображения</p>';
                totalVotesSpan.textContent = 'Всего голосов: 0';
                return;
            }

            const votes = {};
            currentSongs.forEach(song => { votes[song] = 0; });

            let total = 0;
            if (votersData) {
                Object.values(votersData).forEach(entry => {
                    if (entry.song && votes.hasOwnProperty(entry.song)) {
                        votes[entry.song]++;
                        total++;
                    }
                });
            }

            resultsDiv.innerHTML = '';
            currentSongs.forEach(song => {
                const count = votes[song];
                const percent = total === 0 ? 0 : (count / total) * 100;
                const html = `
                    <div class="song-bar">
                        <div class="song-label">
                            <span>${song.replace(/</g, '&lt;')}</span>
                            <span>${count} голос(ов)</span>
                        </div>
                        <div class="progress">
                            <div class="progress-fill" style="width: ${percent}%">
                                ${percent > 5 ? Math.round(percent) + '%' : ''}
                            </div>
                        </div>
                    </div>
                `;
                resultsDiv.innerHTML += html;
            });
            totalVotesSpan.textContent = `Всего голосов: ${total}`;
        }

        // Кнопка "Кто будет петь?"
        document.getElementById('drawBtn').addEventListener('click', () => {
            if (!lastVotersData || Object.keys(lastVotersData).length === 0) {
                drawResultDiv.style.display = 'block';
                drawResultDiv.innerHTML = 'Нет голосов для выбора.';
                return;
            }

            // Подсчёт голосов по песням
            const songVotes = {};
            Object.values(lastVotersData).forEach(entry => {
                if (entry.song) {
                    songVotes[entry.song] = (songVotes[entry.song] || 0) + 1;
                }
            });

            if (Object.keys(songVotes).length === 0) {
                drawResultDiv.style.display = 'block';
                drawResultDiv.innerHTML = 'Нет песен с голосами.';
                return;
            }

            // Определяем максимальное число голосов
            const maxVotes = Math.max(...Object.values(songVotes));
            // Находим все песни с таким количеством голосов
            const topSongs = Object.entries(songVotes)
                .filter(([song, count]) => count === maxVotes)
                .map(([song]) => song);

            // Собираем всех проголосовавших за эти песни
            const candidates = [];
            Object.entries(lastVotersData).forEach(([deviceId, entry]) => {
                if (topSongs.includes(entry.song)) {
                    candidates.push({
                        deviceId: deviceId,
                        number: entry.number || 'без номера',
                        song: entry.song
                    });
                }
            });

            if (candidates.length === 0) {
                drawResultDiv.style.display = 'block';
                drawResultDiv.innerHTML = 'Нет участников, проголосовавших за лидирующие песни.';
                return;
            }

            // Случайный выбор
            const randomIndex = Math.floor(Math.random() * candidates.length);
            const winner = candidates[randomIndex];

            // Показываем результат
            drawResultDiv.style.display = 'block';
            drawResultDiv.innerHTML = `
                🎉Участник номер <strong>${winner.number}</strong><br>
                Сегодня поёт: <strong>${winner.song}</strong>
            `;
        });

        // Сброс голосов
        document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Сбросить все голоса? Участники смогут проголосовать заново.')) {
        set(votersRef, null)
            .then(() => set(nextNumberRef, null))
            .then(() => {
                alert('Голоса и номера сброшены.');
                drawResultDiv.style.display = 'none';
            })
            .catch(err => alert('Ошибка: ' + err.message));
    }
        });
    </script>
</body>
</html>
