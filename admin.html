<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка – Голосование</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .admin-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 { text-align: center; margin-top: 0; }
        .draw-btn {
            display: block;
            margin: 10px auto 20px;
            padding: 12px 25px;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            background-color: #3498db;
            transition: background-color 0.2s;
        }
        .draw-btn:hover { background-color: #2980b9; }
        .song-bar { margin-bottom: 20px; }
        .song-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .progress {
            background: #eee;
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #4CAF50;
            border-radius: 10px;
            transition: width 0.3s ease;
            text-align: right;
            padding-right: 5px;
            color: white;
            font-size: 14px;
            line-height: 24px;
            box-sizing: border-box;
        }
        .total-votes {
            text-align: center;
            margin: 20px 0;
            font-size: 18px;
        }
        .draw-result {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1>📊 Результаты голосования</h1>
        <button id="drawBtn" class="draw-btn">🎤 Кто будет петь?</button>
        <div id="results"></div>
        <div class="total-votes" id="totalVotes">Всего голосов: 0</div>
        <div id="drawResult" class="draw-result" style="display: none;"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ Вставь СВОЙ конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAfxfl7oncihM8TUHbfgi9lr95St-KNRX8",
            authDomain: "songlisttestproj.firebaseapp.com",
            databaseURL: "https://songlisttestproj-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "songlisttestproj",
            storageBucket: "songlisttestproj.firebasestorage.app",
            messagingSenderId: "134407495087",
            appId: "1:134407495087:web:c450f82c497e785eca235a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const votersRef = ref(db, 'voters');
        const songsRef = ref(db, 'playlist/songs');
        const resultsDiv = document.getElementById('results');
        const totalVotesSpan = document.getElementById('totalVotes');
        const drawResultDiv = document.getElementById('drawResult');

        let currentSongs = [];
        let lastVotersData = null;

        // Слушаем плейлист
        onValue(songsRef, (snapshot) => {
            currentSongs = snapshot.val() || [];
            if (lastVotersData) renderBars(lastVotersData);
        });

        // Слушаем голоса
        onValue(votersRef, (snapshot) => {
            lastVotersData = snapshot.val() || {};
            renderBars(lastVotersData);
        });

        function renderBars(votersData) {
    if (!currentSongs.length) {
        resultsDiv.innerHTML = '<p style="text-align:center">Нет песен для отображения</p>';
        totalVotesSpan.textContent = 'Всего голосов: 0';
        return;
    }

    // Подсчитываем голоса
    const votes = {};
    currentSongs.forEach(song => { votes[song] = 0; });
    let total = 0;
    Object.values(votersData).forEach(entry => {
        if (entry.song && votes.hasOwnProperty(entry.song)) {
            votes[entry.song]++;
            total++;
        }
    });

    // Сортируем песни по количеству голосов (по убыванию)
    const sortedSongs = [...currentSongs].sort((a, b) => (votes[b] || 0) - (votes[a] || 0));

    resultsDiv.innerHTML = '';
    sortedSongs.forEach(song => {
        const count = votes[song] || 0;
        const percent = total === 0 ? 0 : (count / total) * 100;
        resultsDiv.innerHTML += `
            <div class="song-bar">
                <div class="song-label">
                    <span>${song.replace(/</g, '&lt;')}</span>
                    <span>${count} голос(ов)</span>
                </div>
                <div class="progress">
                    <div class="progress-fill" style="width: ${percent}%">
                        ${percent > 5 ? Math.round(percent) + '%' : ''}
                    </div>
                </div>
            </div>
        `;
    });
    totalVotesSpan.textContent = `Всего голосов: ${total}`;
}

        // Розыгрыш
        document.getElementById('drawBtn').addEventListener('click', () => {
            if (!lastVotersData || Object.keys(lastVotersData).length === 0) {
                drawResultDiv.style.display = 'block';
                drawResultDiv.innerHTML = 'Нет голосов для выбора.';
                return;
            }
            const songVotes = {};
            Object.values(lastVotersData).forEach(entry => {
                if (entry.song) songVotes[entry.song] = (songVotes[entry.song] || 0) + 1;
            });
            if (Object.keys(songVotes).length === 0) {
                drawResultDiv.style.display = 'block';
                drawResultDiv.innerHTML = 'Нет песен с голосами.';
                return;
            }
            const maxVotes = Math.max(...Object.values(songVotes));
            const topSongs = Object.entries(songVotes)
                .filter(([song, count]) => count === maxVotes)
                .map(([song]) => song);
            const candidates = [];
            Object.entries(lastVotersData).forEach(([deviceId, entry]) => {
                if (topSongs.includes(entry.song)) {
                    candidates.push({ number: entry.number || 'без номера', song: entry.song });
                }
            });
            if (candidates.length === 0) {
                drawResultDiv.style.display = 'block';
                drawResultDiv.innerHTML = 'Нет участников для выбора.';
                return;
            }
            const winner = candidates[Math.floor(Math.random() * candidates.length)];
            drawResultDiv.style.display = 'block';
            drawResultDiv.innerHTML = `
                🎉 Участник номер <strong>${winner.number}</strong><br>
                Сегодня поёт: <strong>${winner.song}</strong>
                
            `;
        });

        // === Настройки оформления ===
            //import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
            //import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

            //const app = initializeApp(firebaseConfig); // используем уже существующую переменную app, если она есть, иначе создаём
            //const db = getDatabase(app);
            const settingsRef = ref(db, 'settings');
                onValue(settingsRef, (snapshot) => {
                    const data = snapshot.val() || {};
                        document.body.style.backgroundColor = data.backgroundColor || '#f5f0e8';
                if (data.backgroundTexture) {
                    document.body.style.backgroundImage = `url(${data.backgroundTexture})`;
                    document.body.style.backgroundRepeat = 'repeat';
                } else {
                    document.body.style.backgroundImage = '';
                    document.body.style.backgroundRepeat = '';
                }
        });
    </script>
</body>
</html>
