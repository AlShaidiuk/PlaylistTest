<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки оформления</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .options-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h1 { text-align: center; margin-top: 0; }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input[type="color"] {
            width: 100%;
            height: 50px;
            border: 1px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            padding: 2px;
            background: white;
        }
        .texture-preview {
            margin-top: 10px;
            width: 100px;
            height: 100px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: auto;
            background-repeat: repeat;
            color: #999;
            font-size: 14px;
            text-align: center;
        }
        .file-info {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .save-btn {
            display: block;
            margin: 20px auto 0;
            padding: 12px 30px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .save-btn:hover { background: #27ae60; }
        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #e67e22;
        }
    </style>
</head>
<body>
    <div class="options-panel">
        <h1>🎨 Настройки оформления</h1>
        <div class="form-group">
            <label for="bgColor">Цвет фона</label>
            <input type="color" id="bgColor" value="#f5f0e8">
        </div>
        <div class="form-group">
            <label for="textureFile">Текстура фона (PNG/JPG, макс. 500×500 px)</label>
            <input type="file" id="textureFile" accept="image/png,image/jpeg">
            <div class="texture-preview" id="texturePreview">Нет текстуры</div>
            <div class="file-info" id="fileInfo"></div>
        </div>
        <button id="saveBtn" class="save-btn">💾 Сохранить настройки</button>
        <div id="message" class="message"></div>
    </div>

    <script type="module">
        // Защита паролем (смени на свой)
        const PASSWORD = 'admin';
        const pass = prompt('Введите пароль для доступа к настройкам:');
        if (pass !== PASSWORD) {
            document.body.innerHTML = '<h1 style="text-align:center; margin-top:50px;">Доступ запрещён</h1>';
            throw new Error('Неверный пароль');
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ Замени на СВОЙ конфиг Firebase
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const settingsRef = ref(db, 'settings');
        const bgColorInput = document.getElementById('bgColor');
        const textureFileInput = document.getElementById('textureFile');
        const texturePreview = document.getElementById('texturePreview');
        const fileInfo = document.getElementById('fileInfo');
        const saveBtn = document.getElementById('saveBtn');
        const messageDiv = document.getElementById('message');

        // Текущие настройки (загрузим при открытии)
        onValue(settingsRef, (snapshot) => {
            const data = snapshot.val() || {};
            if (data.backgroundColor) {
                bgColorInput.value = data.backgroundColor;
            }
            if (data.backgroundTexture) {
                texturePreview.style.backgroundImage = `url(${data.backgroundTexture})`;
                texturePreview.textContent = '';
                fileInfo.textContent = 'Текстура установлена';
            } else {
                texturePreview.style.backgroundImage = '';
                texturePreview.textContent = 'Нет текстуры';
                fileInfo.textContent = '';
            }
            // Применяем фон к самой странице (для предпросмотра)
            applyBackground(data);
        }, { onlyOnce: true });

        // Предпросмотр при выборе файла
        textureFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Проверка типа
            if (!file.type.match(/image\/(png|jpeg)/)) {
                messageDiv.textContent = 'Только PNG или JPG!';
                textureFileInput.value = '';
                return;
            }

            // Проверка размера через Image
            const img = new Image();
            const reader = new FileReader();
            reader.onload = (ev) => {
                img.src = ev.target.result;
            };
            img.onload = () => {
                if (img.width > 500 || img.height > 500) {
                    messageDiv.textContent = 'Изображение должно быть не более 500×500 px!';
                    textureFileInput.value = '';
                    fileInfo.textContent = '';
                } else {
                    messageDiv.textContent = '';
                    fileInfo.textContent = `${img.width}×${img.height} px, готово к загрузке`;
                    // Показываем превью текстуры
                    texturePreview.style.backgroundImage = `url(${img.src})`;
                    texturePreview.textContent = '';
                }
            };
            reader.readAsDataURL(file);
        });

        // Сохранение
        saveBtn.addEventListener('click', async () => {
            const bgColor = bgColorInput.value;
            const file = textureFileInput.files[0];

            const newSettings = {
                backgroundColor: bgColor
            };

            if (file) {
                // Повторная проверка (на всякий случай)
                const img = new Image();
                const reader = new FileReader();
                const fileDataUrl = await new Promise((resolve, reject) => {
                    reader.onload = (ev) => resolve(ev.target.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
                img.src = fileDataUrl;
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                });

                if (img.width > 500 || img.height > 500) {
                    messageDiv.textContent = 'Ошибка: изображение больше 500×500 px!';
                    return;
                }
                newSettings.backgroundTexture = fileDataUrl;
            } else {
                newSettings.backgroundTexture = null;
            }

            try {
                await set(settingsRef, newSettings);
                messageDiv.textContent = '✅ Настройки сохранены!';
                // Применяем к странице немедленно
                applyBackground(newSettings);
            } catch (err) {
                messageDiv.textContent = '❌ Ошибка: ' + err.message;
            }
        });

        function applyBackground(settings) {
            let bg = settings.backgroundColor || '#f5f0e8';
            document.body.style.backgroundColor = bg;
            if (settings.backgroundTexture) {
                document.body.style.backgroundImage = `url(${settings.backgroundTexture})`;
                document.body.style.backgroundRepeat = 'repeat';
            } else {
                document.body.style.backgroundImage = '';
            }
        }
    </script>
</body>
</html>
