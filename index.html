<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что сегодня поем?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .playlist {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 28px;
        }
        ol {
            padding-left: 20px;
            margin: 0;
            list-style: decimal;
        }
        li {
            font-size: 18px;
            padding: 12px 10px;
            border-bottom: 1px dashed #e0e0e0;
            color: #333;
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
        }
        li:last-child {
            border-bottom: none;
        }
        /* Стиль для неактивной (выбранной) песни */
        li.inactive {
            color: #bbbbbb;
        }
        /* Лёгкий эффект при наведении */
        li:hover {
            background-color: #fafafa;
        }
    </style>
</head>
<body>
    <div class="playlist">
        <h1>🎤 Что сегодня поем?</h1>
        <ol id="songList">
            <li>Песня трубадура</li>
            <li>Седьмой лепесток</li>
            <li>Выхода нет</li>
            <li>Мой рок-н-ролл</li>
            <li>Знаешь ли ты</li>
            <li>Родина</li>
            <li>Батарейка</li>
        </ol>
        <p style="text-align: center; color: #888; font-size: 14px; margin-top: 20px;">
            👆 Кликай на песню, чтобы отметить её
        </p>
    </div>

    <script>
        // Получаем все элементы списка
        const songs = document.querySelectorAll('#songList li');

        songs.forEach(song => {
            song.addEventListener('click', function() {
                // Переключаем класс 'inactive' при клике
                this.classList.toggle('inactive');
            });
        });
    </script>
</body>
</html>
