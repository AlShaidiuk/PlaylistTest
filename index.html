<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что сегодня поем?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .playlist {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 28px;
        }
        ol {
            padding-left: 20px;
            margin: 0;
            list-style: decimal;
        }
        li {
            font-size: 18px;
            padding: 12px 10px;
            border-bottom: 1px dashed #e0e0e0;
            color: #333;
            cursor: pointer;
            transition: color 0.2s ease, background-color 0.2s ease;
            user-select: none;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        li:last-child {
            border-bottom: none;
        }
        li.pre-selected {
            color: #999999;
            background-color: #f9f9f9;
        }
        li.confirmed {
            color: #555555;
            background-color: #f0f0f0;
            cursor: default;
        }
        .confirm-btn {
            background: none;
            border: 2px solid #4CAF50;
            color: #4CAF50;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            margin-left: 15px;
            flex-shrink: 0;
        }
        .confirm-btn:hover {
            background-color: #4CAF50;
            color: white;
        }
        li.pre-selected .confirm-btn {
            display: flex;
        }
        .confirmed-icon {
            display: none;
            color: #4CAF50;
            font-size: 20px;
            margin-left: 15px;
            flex-shrink: 0;
        }
        li.confirmed .confirmed-icon {
            display: block;
        }
        .instruction {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
            color: #e74c3c;
        }
        .voter-number {
            text-align: center;
            font-size: 20px;
            color: #2ecc71;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="playlist">
        <h1>🎤 Что сегодня поем?</h1>
        <ol id="songList"></ol>
        <p class="instruction">👆 Кликни на песню, чтобы выбрать, затем ✓ чтобы подтвердить.</p>
        <div class="message" id="message"></div>
        <div class="voter-number" id="voterNumber"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ Вставь СВОЙ конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAfxfl7oncihM8TUHbfgi9lr95St-KNRX8",
            authDomain: "songlisttestproj.firebaseapp.com",
            databaseURL: "https://songlisttestproj-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "songlisttestproj",
            storageBucket: "songlisttestproj.firebasestorage.app",
            messagingSenderId: "134407495087",
            appId: "1:134407495087:web:c450f82c497e785eca235a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const songsRef = ref(db, 'playlist/songs');
        const votersRef = ref(db, 'voters');
        const nextNumberRef = ref(db, 'metadata/nextNumber');
        const MAX_VOTERS = 200;

        const songList = document.getElementById('songList');
        const messageDiv = document.getElementById('message');
        const voterNumberDiv = document.getElementById('voterNumber');

        // Генерируем или восстанавливаем ID устройства
        let deviceId = localStorage.getItem('voterDeviceId');
        if (!deviceId) {
            deviceId = 'device_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('voterDeviceId', deviceId);
        }
        const voterRef = ref(db, 'voters/' + deviceId);

        let currentSongs = [];
        let votedSong = null;
        let myVoterNumber = null;

        // Проверяем, голосовало ли устройство ранее (данные в localStorage)
        const storedVote = localStorage.getItem('voterData');
        if (storedVote) {
            const parsed = JSON.parse(storedVote);
            votedSong = parsed.song;
            myVoterNumber = parsed.number;
        }

        // Проверяем актуальность голоса в базе (вдруг админ сбросил?)
        get(voterRef).then(snapshot => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                votedSong = data.song;
                myVoterNumber = data.number;
                localStorage.setItem('voterData', JSON.stringify({ song: votedSong, number: myVoterNumber }));
            } else {
                // Если в базе нет записи, но в localStorage есть — значит сбросили
                if (votedSong) {
                    localStorage.removeItem('voterData');
                    votedSong = null;
                    myVoterNumber = null;
                }
            }
        });

        // Обновление списка песен
        onValue(songsRef, (snapshot) => {
            currentSongs = snapshot.val() || [];
            renderSongList(currentSongs);
        });

        function renderSongList(songs) {
            songList.innerHTML = '';
            songs.forEach(songName => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="song-text">${songName.replace(/</g, '&lt;')}</span>
                    <button class="confirm-btn">✓</button>
                    <span class="confirmed-icon">✓</span>
                `;
                // Если устройство уже голосовало за эту песню – подсвечиваем
                if (votedSong === songName) {
                    li.classList.add('confirmed');
                }
                songList.appendChild(li);
            });

            // Блокируем голосование, если голос уже отдан
            if (votedSong) {
                document.querySelectorAll('#songList li').forEach(li => li.style.cursor = 'default');
                messageDiv.textContent = `Вы проголосовали за: ${votedSong}`;
                voterNumberDiv.textContent = `Ваш номер: ${myVoterNumber}`;
            } else {
                messageDiv.textContent = '';
                voterNumberDiv.textContent = '';
            }
        }

        // Обработчик кликов по списку
        songList.addEventListener('click', function(e) {
            const li = e.target.closest('li');
            if (!li) return;

            // Если уже голосовали — игнорируем
            if (votedSong) return;

            const songName = li.querySelector('.song-text').textContent;

            // Клик по кнопке подтверждения
            if (e.target.closest('.confirm-btn')) {
                e.stopPropagation();
                if (votedSong) return;

                // Атомарная операция: получить следующий номер, увеличить счётчик
                runTransaction(nextNumberRef, (currentNumber) => {
                    // currentNumber может быть null при первом запуске
                    const next = (currentNumber || 0) + 1;
                    if (next > MAX_VOTERS) {
                        // Превышен лимит — не сохраняем номер
                        return; // вернёт undefined, транзакция отменяется, возвращаем ошибку?
                        // Вместо этого можно вернуть currentNumber, но тогда голос не примется, мы обработаем ниже
                    }
                    return next;
                }).then((result) => {
                    if (!result.committed) {
                        // Транзакция не прошла (скорее всего из-за лимита)
                        messageDiv.textContent = 'Голосование завершено, все 200 мест заняты.';
                        return;
                    }
                    const newNumber = result.snapshot.val();
                    // Сохраняем данные голоса
                    set(voterRef, {
                        song: songName,
                        number: newNumber,
                        timestamp: Date.now()
                    }).then(() => {
                        votedSong = songName;
                        myVoterNumber = newNumber;
                        localStorage.setItem('voterData', JSON.stringify({ song: votedSong, number: myVoterNumber }));

                        // Визуал
                        document.querySelectorAll('#songList li').forEach(item => {
                            item.classList.remove('pre-selected', 'confirmed');
                            item.style.cursor = 'default';
                        });
                        li.classList.add('confirmed');
                        messageDiv.textContent = `Спасибо, ваш голос учтён!`;
                        voterNumberDiv.textContent = `Ваш номер: ${newNumber}`;
                    }).catch(err => {
                        messageDiv.textContent = 'Ошибка записи голоса: ' + err.message;
                    });
                }).catch(err => {
                    messageDiv.textContent = 'Ошибка транзакции: ' + err.message;
                });
                return;
            }

            // Логика предвыбора
            if (li.classList.contains('confirmed')) return;
            if (li.classList.contains('pre-selected')) {
                li.classList.remove('pre-selected');
            } else {
                document.querySelectorAll('#songList li.pre-selected').forEach(item => item.classList.remove('pre-selected'));
                li.classList.add('pre-selected');
            }
        });
    </script>
</body>
</html>
