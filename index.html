<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Что сегодня поем?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            /* Фон будет задаваться динамически через настройки (options.html) */
            background-color: #f5f0e8;
            background-repeat: repeat;
            transition: background-color 0.3s ease;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Контейнер action sheet */
        .action-sheet {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 500px;
            padding: 28px 24px 32px;
            margin: 0 16px;
            animation: slideUp 0.35s cubic-bezier(0.21, 1.02, 0.56, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            color: #1c1c1e;
            margin-bottom: 8px;
        }

        .instruction {
            text-align: center;
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        /* Список песен */
        ol#songList {
            list-style: none;
            counter-reset: song-counter;
            padding: 0;
        }

        li {
            counter-increment: song-counter;
            font-size: 17px;
            padding: 14px 12px;
            margin-bottom: 8px;
            border-radius: 14px;
            background: #f2f2f7;
            color: #1c1c1e;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s, color 0.2s, transform 0.1s;
            user-select: none;
            position: relative;
        }

        li:active {
            transform: scale(0.98);
        }

        /* Номер песни (декоративный) */
        li::before {
            content: counter(song-counter);
            font-weight: 500;
            color: #8e8e93;
            margin-right: 12px;
            font-size: 16px;
            min-width: 20px;
        }

        .song-text {
            flex: 1;
            font-weight: 500;
        }

        /* Предвыбранное состояние (State 2) */
        li.pre-selected {
            background: #e8e8ed;
            color: #3a3a3c;
        }

        /* Подтверждённое состояние (State 3) */
        li.confirmed {
            background: #e5e5ea;
            color: #8e8e93;
            cursor: default;
        }

        /* Кнопка подтверждения */
        .confirm-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #34c759;
            background: transparent;
            color: #34c759;
            font-size: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .confirm-btn:hover {
            background: #34c759;
            color: white;
        }

        li.pre-selected .confirm-btn {
            display: flex;
        }

        /* Галочка подтверждённой песни */
        .confirmed-icon {
            display: none;
            color: #34c759;
            font-size: 22px;
            margin-left: 12px;
            flex-shrink: 0;
        }

        li.confirmed .confirmed-icon {
            display: block;
        }

        /* Сообщение и номер */
        .message {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
            color: #ff3b30;
            font-weight: 500;
        }

        .voter-number {
            text-align: center;
            margin-top: 12px;
            font-size: 18px;
            font-weight: 600;
            color: #007aff;
        }
    </style>
</head>
<body>
    <div class="action-sheet">
        <h1>🎤 Что будем петь?</h1>
        <p class="instruction">
            Кликни на песню, чтобы выбрать,<br>а затем ✓ чтобы подтвердить выбор
        </p>
        <ol id="songList"></ol>
        <div class="message" id="message"></div>
        <div class="voter-number" id="voterNumber"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ Вставь СВОЙ конфиг Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAfxfl7oncihM8TUHbfgi9lr95St-KNRX8",
            authDomain: "songlisttestproj.firebaseapp.com",
            databaseURL: "https://songlisttestproj-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "songlisttestproj",
            storageBucket: "songlisttestproj.firebasestorage.app",
            messagingSenderId: "134407495087",
            appId: "1:134407495087:web:c450f82c497e785eca235a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const songsRef = ref(db, 'playlist/songs');
        const votersRef = ref(db, 'voters');
        const nextNumberRef = ref(db, 'metadata/nextNumber');
        const settingsRef = ref(db, 'settings');
        const MAX_VOTERS = 200;

        const songList = document.getElementById('songList');
        const messageDiv = document.getElementById('message');
        const voterNumberDiv = document.getElementById('voterNumber');

        // Применяем настройки фона из Firebase (синхронизация с options.html)
        onValue(settingsRef, (snapshot) => {
            const data = snapshot.val() || {};
            document.body.style.backgroundColor = data.backgroundColor || '#f5f0e8';
            if (data.backgroundTexture) {
                document.body.style.backgroundImage = `url(${data.backgroundTexture})`;
                document.body.style.backgroundRepeat = 'repeat';
            } else {
                document.body.style.backgroundImage = '';
                document.body.style.backgroundRepeat = '';
            }
        });

        // Генерируем или восстанавливаем ID устройства
        let deviceId = localStorage.getItem('voterDeviceId');
        if (!deviceId) {
            deviceId = 'device_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('voterDeviceId', deviceId);
        }
        const voterRef = ref(db, 'voters/' + deviceId);

        let currentSongs = [];
        let votedSong = null;
        let myVoterNumber = null;

        // Проверяем localStorage
        const storedVote = localStorage.getItem('voterData');
        if (storedVote) {
            const parsed = JSON.parse(storedVote);
            votedSong = parsed.song;
            myVoterNumber = parsed.number;
        }

        // Сверяем с базой (вдруг админ сбросил)
        get(voterRef).then(snapshot => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                votedSong = data.song;
                myVoterNumber = data.number;
                localStorage.setItem('voterData', JSON.stringify({ song: votedSong, number: myVoterNumber }));
            } else {
                if (votedSong) {
                    localStorage.removeItem('voterData');
                    votedSong = null;
                    myVoterNumber = null;
                }
            }
        });

        // Получаем список песен
        onValue(songsRef, (snapshot) => {
            currentSongs = snapshot.val() || [];
            renderSongList(currentSongs);
        });

        function renderSongList(songs) {
            songList.innerHTML = '';
            songs.forEach(songName => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="song-text">${songName.replace(/</g, '&lt;')}</span>
                    <button class="confirm-btn">✓</button>
                    <span class="confirmed-icon">✓</span>
                `;
                // Если уже голосовали за эту песню – показываем как подтверждённую
                if (votedSong === songName) {
                    li.classList.add('confirmed');
                }
                songList.appendChild(li);
            });

            // Блокируем интерфейс, если голос уже отдан
            if (votedSong) {
                document.querySelectorAll('#songList li').forEach(li => {
                    li.style.cursor = 'default';
                });
                messageDiv.textContent = '';
                voterNumberDiv.textContent = `Ваш номер: ${myVoterNumber}`;
            } else {
                messageDiv.textContent = '';
                voterNumberDiv.textContent = '';
            }
        }

        // Делегирование кликов
        songList.addEventListener('click', function(e) {
            const li = e.target.closest('li');
            if (!li) return;

            // Если голос уже отдан — игнорируем
            if (votedSong) return;

            const songName = li.querySelector('.song-text').textContent;

            // Клик по кнопке подтверждения
            if (e.target.closest('.confirm-btn')) {
                e.stopPropagation();
                if (votedSong) return;

                // Транзакция для получения уникального номера
                runTransaction(nextNumberRef, (currentNumber) => {
                    const next = (currentNumber || 0) + 1;
                    if (next > MAX_VOTERS) {
                        return; // отмена транзакции
                    }
                    return next;
                }).then((result) => {
                    if (!result.committed) {
                        messageDiv.textContent = 'Голосование завершено, все 200 мест заняты.';
                        return;
                    }
                    const newNumber = result.snapshot.val();
                    set(voterRef, {
                        song: songName,
                        number: newNumber,
                        timestamp: Date.now()
                    }).then(() => {
                        votedSong = songName;
                        myVoterNumber = newNumber;
                        localStorage.setItem('voterData', JSON.stringify({ song: votedSong, number: myVoterNumber }));

                        // Визуал состояния 3
                        document.querySelectorAll('#songList li').forEach(item => {
                            item.classList.remove('pre-selected', 'confirmed');
                            item.style.cursor = 'default';
                        });
                        li.classList.add('confirmed');
                        messageDiv.textContent = '';
                        voterNumberDiv.textContent = `Ваш номер: ${newNumber}`;
                    }).catch(err => {
                        messageDiv.textContent = 'Ошибка записи голоса: ' + err.message;
                    });
                }).catch(err => {
                    messageDiv.textContent = 'Ошибка транзакции: ' + err.message;
                });
                return;
            }

            // Предвыбор (State 2)
            if (li.classList.contains('confirmed')) return;

            if (li.classList.contains('pre-selected')) {
                li.classList.remove('pre-selected');
            } else {
                document.querySelectorAll('#songList li.pre-selected').forEach(item => {
                    item.classList.remove('pre-selected');
                });
                li.classList.add('pre-selected');
            }
        });
    </script>
</body>
</html>
