<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что сегодня поем?</title>
    <style>
        /* Здесь оставь те же стили, что в предыдущем ответе (без изменений) */
    </style>
</head>
<body>
    <div class="playlist">
        <h1>🎤 Что сегодня поем?</h1>
        <ol id="songList">
            <!-- те же песни, что и раньше -->
        </ol>
        <p class="instruction">...</p>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ Замени на данные своего проекта Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAfxfl7oncihM8TUHbfgi9lr95St-KNRX8",
            authDomain: "songlisttestproj.firebaseapp.com",
            databaseURL: "https://songlisttestproj-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "songlisttestproj",
            storageBucket: "songlisttestproj.firebasestorage.app",
            messagingSenderId: "134407495087",
            appId: "1:134407495087:web:c450f82c497e785eca235a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const songList = document.getElementById('songList');
        let currentConfirmed = null;

        // При загрузке страницы проверяем, есть ли уже выбранная песня в базе
        const voteRef = ref(db, 'currentVote');
        onValue(voteRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.song) {
                // Подсвечиваем песню, если она выбрана (но не мешаем локальному выбору)
                document.querySelectorAll('#songList li').forEach(li => {
                    li.classList.remove('confirmed');
                    if (li.querySelector('.song-text').textContent === data.song) {
                        li.classList.add('confirmed');
                    }
                });
            }
        });

        // Обработчик кликов (отправляет голос в Firebase)
        songList.addEventListener('click', function(e) {
            const li = e.target.closest('li');
            if (!li) return;

            if (e.target.closest('.confirm-btn')) {
                e.stopPropagation();
                const songName = li.querySelector('.song-text').textContent;

                // Отправляем выбранную песню в Firebase
                set(ref(db, 'currentVote'), {
                    song: songName,
                    timestamp: Date.now()
                });

                // Визуально показываем подтверждение (локально)
                document.querySelectorAll('#songList li.confirmed').forEach(item => {
                    item.classList.remove('confirmed');
                });
                li.classList.add('confirmed');
                if (li.classList.contains('pre-selected')) {
                    li.classList.remove('pre-selected');
                }
                return;
            }

            // Логика предвыбора остаётся локальной
            // ... (аналогично предыдущему коду, без изменений)
        });
    </script>
</body>
</html>
